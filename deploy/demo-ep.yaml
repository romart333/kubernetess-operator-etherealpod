# Minimal EtherealPod for the restart-counting demo:
# crash it with `kubectl exec example-ep -- pkill sleep` (kill the child,
# not PID 1) or `kubectl delete pod example-ep` and watch RESTARTS grow
# in `kubectl get eps`.
apiVersion: workload.sunday.io/v1alpha1
kind: EtherealPod
metadata:
  name: example-ep
spec:
  template:
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - name: main
          image: alpine:3.20
          imagePullPolicy: IfNotPresent
          # Backgrounding keeps sh as PID 1 (a bare `sh -c "sleep ..."` is
          # exec-optimized into sleep itself, and PID 1 ignores signals it
          # has no handler for — the crash demo would be impossible).
          command: ["sh", "-c", "sleep 3600 & wait $!"]
