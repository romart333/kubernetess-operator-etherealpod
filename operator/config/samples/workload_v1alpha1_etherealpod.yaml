apiVersion: workload.sunday.io/v1alpha1
kind: EtherealPod
metadata:
  labels:
    app.kubernetes.io/name: etherealpod
    app.kubernetes.io/managed-by: kustomize
  name: etherealpod-sample
spec:
  template:
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - name: main
          image: alpine:3.20
          imagePullPolicy: IfNotPresent
          # Backgrounding keeps sh as PID 1: a bare `sh -c "sleep ..."` is
          # exec-optimized into sleep itself, and PID 1 ignores signals it
          # has no handler for.
          command: ["sh", "-c", "sleep 3600 & wait $!"]
